<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeuStudio - Entrada de Convidado</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    color: #00e676;
    text-shadow: 0 0 20px rgba(0,230,118,0.3);
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 30px;
  }
  .room-info {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .room-info .label {
    font-size: 0.9rem;
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .room-info .name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-top: 4px;
  }
  .name-input {
    width: 100%;
    padding: 12px 16px;
    background: #1a1a1a;
    border: 2px solid #2a2a2a;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus {
    border-color: #00e676;
  }
  .name-input::placeholder {
    color: #555;
  }
  .btn-connect {
    width: 100%;
    padding: 14px;
    background: #00e676;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-connect:hover {
    background: #00c853;
    transform: scale(1.02);
  }
  .btn-connect:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    transform: none;
  }
  .video-container {
    display: none;
    margin-top: 20px;
  }
  .video-container.active {
    display: block;
  }
  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    max-height: 60vh;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #00e676;
  }
  .video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .video-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00e676;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .ctrl-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .ctrl-btn.mute {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #333;
  }
  .ctrl-btn.mute.muted {
    background: #ff0040;
    border-color: #ff0040;
    color: #fff;
  }
  .ctrl-btn.camera {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #333;
  }
  .ctrl-btn.camera.off {
    background: #ff0040;
    border-color: #ff0040;
    color: #fff;
  }
  .waiting-msg {
    margin-top: 16px;
    padding: 12px;
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 8px;
    font-size: 0.8rem;
    color: #00e676;
  }
  .error-msg {
    margin-top: 16px;
    padding: 12px;
    background: rgba(255,0,64,0.1);
    border: 1px solid rgba(255,0,64,0.2);
    border-radius: 8px;
    font-size: 0.8rem;
    color: #ff0040;
  }
  .flip-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo"><i class="fas fa-video"></i> MeuStudio</div>
  <div class="subtitle">Entrada de Convidado</div>

  <div class="room-info">
    <div class="label">TVCamaraMaracanaú</div>
    <div class="name" id="roomName">Carregando...</div>
  </div>

  <div id="loginForm">
    <input type="text" class="name-input" id="guestName" placeholder="Complete seu nome" maxlength="60" autocomplete="off">
    <button class="btn-connect" id="btnConnect" disabled>
      <i class="fas fa-video"></i> Entrar na Sala
    </button>
  </div>

  <div class="video-container" id="videoContainer">
    <div class="video-wrapper">
      <video id="localVideo" autoplay playsinline muted></video>
      <button class="flip-btn" id="flipBtn" title="Trocar câmera">🔄</button>
      <div class="video-overlay">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span id="statusText">Conectando...</span>
        </div>
        <span id="guestDisplay" style="font-size:0.75rem;color:#aaa;"></span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn mute" id="btnMute" onclick="toggleMute()">
        <i class="fas fa-microphone"></i> Áudio
      </button>
      <button class="ctrl-btn camera" id="btnCamera" onclick="toggleCamera()">
        <i class="fas fa-video"></i> Câmera
      </button>
    </div>

    <div class="waiting-msg" id="waitingMsg">
      <i class="fas fa-hourglass-half"></i> Aguardando o diretor aceitar sua entrada...
    </div>
  </div>

  <div class="error-msg" id="errorMsg" style="display:none;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const roomId = params.get('id') || 'sala-01';
  const fullName = params.get('name');
  const hasName = fullName !== null && fullName !== '';

  if (hasName) {
    document.getElementById('roomName').textContent = fullName;
  } else {
    document.getElementById('roomName').textContent = roomId.replace('sala-', 'Sala ').replace(/-/g, ' ');
  }

  let localStream = null;
  let isMuted = false;
  let isCameraOff = false;
  let facingMode = 'user';

  const nameInput = document.getElementById('guestName');
  const btnConnect = document.getElementById('btnConnect');
  const videoContainer = document.getElementById('videoContainer');
  const loginForm = document.getElementById('loginForm');
  const localVideo = document.getElementById('localVideo');
  const statusText = document.getElementById('statusText');
  const guestDisplay = document.getElementById('guestDisplay');
  const waitingMsg = document.getElementById('waitingMsg');
  const errorMsg = document.getElementById('errorMsg');

  if (hasName) {
    var firstName = fullName.split(' ')[0].toUpperCase();
    var surnameHint = fullName.substring(fullName.split(' ')[0].length).trim().toUpperCase();
    nameInput.value = firstName + ' ';
    nameInput.setSelectionRange(nameInput.value.length, nameInput.value.length);
    nameInput.placeholder = 'Complete: ' + surnameHint;
  } else {
    nameInput.value = '';
    nameInput.placeholder = 'Seu nome completo';
  }

  nameInput.addEventListener('input', function() {
    var val = nameInput.value.trim();
    if (hasName) {
      btnConnect.disabled = val.toUpperCase() !== fullName.toUpperCase();
    } else {
      btnConnect.disabled = val.length < 3;
    }
  });

  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !btnConnect.disabled) connect();
  });

  btnConnect.addEventListener('click', connect);

  async function connect() {
    const name = nameInput.value.trim();
    if (hasName && name.toUpperCase() !== fullName.toUpperCase()) return;
    if (!hasName && name.length < 3) return;

    btnConnect.disabled = true;
    btnConnect.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });

      localVideo.srcObject = localStream;

      loginForm.style.display = 'none';
      videoContainer.classList.add('active');
      guestDisplay.textContent = name.toUpperCase();
      statusText.textContent = 'Conectado';

      if (window.opener) {
        try {
          window.opener.postMessage({
            type: 'guest-connected',
            roomId: roomId,
            guestName: name,
            timestamp: Date.now()
          }, '*');
        } catch(e) {}
      }

      const guestData = {
        type: 'guest-connected',
        roomId: roomId,
        guestName: name,
        timestamp: Date.now(),
        status: 'waiting'
      };
      localStorage.setItem('guest-' + roomId, JSON.stringify(guestData));

      window.addEventListener('storage', function(e) {
        if (e.key === 'guest-action-' + roomId) {
          handleDirectorAction(JSON.parse(e.newValue));
        }
      });

      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'director-action') {
          handleDirectorAction(e.data);
        }
      });

    } catch(err) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = 'Erro ao acessar câmera: ' + err.message;
      btnConnect.disabled = false;
      btnConnect.innerHTML = '<i class="fas fa-video"></i> Tentar Novamente';
    }
  }

  function handleDirectorAction(action) {
    if (action.action === 'accept') {
      waitingMsg.innerHTML = '<i class="fas fa-check-circle"></i> Voc\u00EA foi aceito na transmiss\u00E3o!';
      waitingMsg.style.background = 'rgba(0,230,118,0.15)';
      waitingMsg.style.borderColor = 'rgba(0,230,118,0.3)';
      waitingMsg.style.color = '#00e676';
      statusText.textContent = 'AO VIVO';
    } else if (action.action === 'reject') {
      waitingMsg.innerHTML = '<i class="fas fa-times-circle"></i> Entrada negada pelo diretor.';
      waitingMsg.style.background = 'rgba(255,0,64,0.15)';
      waitingMsg.style.borderColor = 'rgba(255,0,64,0.3)';
      waitingMsg.style.color = '#ff0040';
      statusText.textContent = 'Negado';
    } else if (action.action === 'cut') {
      waitingMsg.innerHTML = '<i class="fas fa-ban"></i> Conex\u00E3o encerrada pelo diretor.';
      statusText.textContent = 'Desconectado';
      if (localStream) {
        localStream.getTracks().forEach(function(t) { t.stop(); });
      }
    }
  }

  window.toggleMute = function() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(function(t) { t.enabled = !isMuted; });
    var btn = document.getElementById('btnMute');
    btn.classList.toggle('muted', isMuted);
    btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i> Mutado' : '<i class="fas fa-microphone"></i> \u00C1udio';
  };

  window.toggleCamera = function() {
    if (!localStream) return;
    isCameraOff = !isCameraOff;
    localStream.getVideoTracks().forEach(function(t) { t.enabled = !isCameraOff; });
    var btn = document.getElementById('btnCamera');
    btn.classList.toggle('off', isCameraOff);
    btn.innerHTML = isCameraOff ? '<i class="fas fa-video-slash"></i> Off' : '<i class="fas fa-video"></i> C\u00E2mera';
  };

  document.getElementById('flipBtn').addEventListener('click', async function() {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    if (localStream) {
      localStream.getVideoTracks().forEach(function(t) { t.stop(); });
      try {
        var newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        localVideo.srcObject = newStream;
        localStream = newStream;
      } catch(e) {
        console.warn('Flip failed:', e);
      }
    }
  });
})();
</script>
</body>
</html>
