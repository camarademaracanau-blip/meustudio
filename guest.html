<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeuStudio - Convidado</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      color: #fff; 
      font-family: sans-serif; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      overflow: hidden;
    }
    video { 
      width: 80vw; 
      max-width: 480px;
      height: 80vh; 
      max-height: 640px;
      background: #111; 
      border-radius: 8px; 
      margin-bottom: 20px;
      object-fit: cover;
    }
    .status { 
      padding: 10px 20px; 
      background: rgba(0,0,0,0.5); 
      border-radius: 20px; 
      font-size: 1.2rem;
      margin: 10px 0;
      max-width: 90%;
      text-align: center;
    }
    .btn { 
      margin: 5px; 
      padding: 12px 24px; 
      background: #ff006e; 
      border: none; 
      border-radius: 30px; 
      color: white; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn:hover { 
      background: #ff3380; 
      transform: scale(1.05);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .info {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 10px;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="status" class="status">Inicializando...</div>
    <button id="leaveBtn" class="btn">Sair da Chamada</button>
    <div class>id="info" class="info">Compartilhe este link com o diretor da transmissão</div>
  </div>

  <script>
    // Configuration
    const SERVER_URL = window.location.origin; // Will connect to same origin as the studio
    const localVideo = document.getElementById('localVideo');
    const statusDiv = document.getElementById('status');
    const leaveBtn = document.getElementById('leaveBtn');
    const infoDiv = document.createElement('div');
    infoDiv.className = 'info';
    infoDiv.textContent = 'Aguardando conexão...';
    document.querySelector('.info').parentNode.insertBefore(infoDiv, document.querySelector('.info').nextSibling);
    
    let peerConnection = null;
    let localStream = null;
    const configuration = { 
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ] 
    };
    let roomId = null;
    let clientId = Math.random().toString(36).substring(2, 15);

    // Initialize
    async function initialize() {
      try {
        statusDiv.textContent = 'Solicitando acesso à câmera e microfone...';
        
        // Get local stream
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { 
            width: { ideal: 640 },
            height: { ideal: 480 },
            frameRate: { ideal: 30 }
          },
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 44100
          }
        });
        
        localVideo.srcObject = localStream;
        localVideo.muted = true; // Mute local video to avoid feedback
        
        statusDiv.textContent = 'Conectando ao servidor...';
        
        // Get room ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        roomId = urlParams.get('room') || 'default';
        
        // Generate unique client ID
        clientId = Math.random().toString(36).substring(2, 15);
        
        // Connect to signaling server (using WebSocket directly for simplicity)
        connectToSignalingServer();
        
      } catch (err) {
        console.error('Error accessing media devices:', err);
        statusDiv.textContent = `Erro: Não foi possível acessar câmera/microfone. ${err.message}`;
        statusDiv.style.background = '#ff0000';
        
        // Show retry button
        const retryBtn = document.createElement('button');
        retryBtn.textContent = 'Tentar Novamente';
        retryBtn.className = 'btn';
        retryBtn.style.marginTop = '10px';
        retryBtn.onclick = () => location.reload();
        statusDiv.parentNode.insertBefore(retryBtn, statusDiv.nextSibling);
      }
    }

    function connectToSignalingServer() {
      // For simplicity, we'll use WebSocket to the same origin
      // In production, you'd want a proper signaling server
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${window.location.host}/ws?room=${roomId}&client=${clientId}`;
      
      const socket = new WebSocket(wsUrl);
      
      socket.onopen = () => {
        console.log('Connected to signaling server');
        statusDiv.textContent = 'Aguardando conexão do diretor...';
        initPeerConnection();
      };
      
      socket.onmessage = async (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === 'offer') {
            console.log('Received offer from director');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.send(JSON.stringify({ type: 'answer', answer: peerConnection.localDescription }));
          } else if (data.type === 'answer') {
            console.log('Received answer from director');
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
          } else if (data.type === 'ice-candidate') {
            try {
              await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch (err) {
              console.error('Error adding received ice candidate', err);
            }
          } else if (data.type === 'connected') {
            statusDiv.textContent = 'Conectado! Transmitindo...';
            statusDiv.style.background = 'rgba(0,100,0,0.5)';
            infoDiv.textContent = `Sua transmissão está ativa. Room: ${roomId}`;
          } else if (data.type === 'disconnected') {
            statusDiv.textContent = 'Diretor desconectou. Aguardando reconexão...';
            statusDiv.style.background = 'rgba(100,100,0,0.5)';
          }
        } catch (err) {
          console.error('Error processing signaling message:', err);
        }
      };
      
      socket.onclose = () => {
        console.log('Disconnected from signaling server');
        statusDiv.textContent = 'Conexão perdida. Tentando reconectar...';
        statusDiv.style.background = 'rgba(100,0,0,0.5)';
        
        // Try to reconnect after 3 seconds
        setTimeout(() => {
          if (socket.readyState === WebSocket.CLOSED) {
            connectToSignalingServer();
          }
        }, 3000);
      };
      
      socket.onerror = (error) => {
        console.error('WebSocket error:', error);
        statusDiv.textContent = 'Erro de conexão. Verifique sua internet.';
        statusDiv.style.background = 'rgba(100,0,0,0.5)';
      };
      
      // Make socket accessible globally for cleanup
      window.signalingSocket = socket;
    }

    function initPeerConnection() {
      try {
        peerConnection = new RTCPeerConnection(configuration);
        
        // Add local tracks to connection
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
          console.log(`Added ${track.kind} track to peer connection`);
        });
        
        // Handle incoming tracks
        peerConnection.ontrack = (event) => {
          console.log('Received remote track');
          // We don't need to display remote video in guest view
          // The director will see this in their studio
        };
        
        // Handle ICE candidates
        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('Generated ICE candidate');
            socket.send(JSON.stringify({ 
              type: 'ice-candidate', 
              candidate: event.candidate 
            }));
          }
        };
        
        // Handle connection state changes
        peerConnection.onconnectionstatechange = () => {
          console.log(`Connection state: ${peerConnection.connectionState}`);
          switch (peerConnection.connectionState) {
            case 'connected':
            case 'completed':
              statusDiv.textContent = 'Conectado! Transmitindo...';
              statusDiv.style.background = 'rgba(0,100,0,0.5)';
              infoDiv.textContent = `Sua transmissão está ativa. Room: ${roomId}`;
              break;
            case 'disconnected':
              statusDiv.textContent = 'Desconectado. Tentando reconectar...';
              statusDiv.style.background = 'rgba(100,100,0,0.5)';
              break;
            case 'failed':
              statusDiv.textContent = 'Conexão falhada. Tentando reconectar...';
              statusDiv.style.background = 'rgba(100,0,0,0.5)';
              // Try to restart ICE
              peerConnection.restartIce();
              break;
            case 'closed':
              statusDiv.textContent = 'Conexão fechada.';
              statusDiv.style.background = 'rgba(100,0,0,0.5)';
              break;
          }
        };
        
        // Create offer to initiate connection
        peerConnection.createOffer()
          .then(offer => peerConnection.setLocalDescription(offer))
          .then(() => {
            console.log('Sending offer to director');
            socket.send(JSON.stringify({ 
              type: 'offer', 
              offer: peerConnection.localDescription 
            }));
          })
          .catch(err => {
            console.error('Error creating offer:', err);
            statusDiv.textContent = 'Erro ao iniciar conexão. Tentando novamente...';
          });
          
      } catch (err) {
        console.error('Error creating peer connection:', err);
        statusDiv.textContent = 'Erro ao inicializar conexão. Recarregue a página.';
        statusDiv.style.background = 'rgba(100,0,0,0.5)';
      }
    }

    // Cleanup when leaving
    function cleanup() {
      console.log('Cleaning up resources...');
      
      // Stop local stream tracks
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      
      // Close peer connection
      if (peerConnection) {
        peerConnection.close();
      }
      
      // Close signaling socket
      if (window.signalingSocket && window.signalingSocket.readyState === WebSocket.OPEN) {
        window.signalingSocket.close();
      }
    }

    // Event listeners
    leaveBtn.addEventListener('click', () => {
      cleanup();
      statusDiv.textContent = 'Saindo...';
      // Redirect to a thank you page or close after delay
      setTimeout(() => {
        window.close(); // Try to close window/tab
      }, 1500);
    });
    
    // Handle page unload
    window.addEventListener('beforeunload', () => {
      cleanup();
    });
    
    // Handle visibility change (if user switches tabs)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Mute local video when tab is hidden to save resources
        if (localVideo) localVideo.muted = true;
      } else {
        // Unmute when visible again (though we keep it muted to prevent feedback)
        if (localVideo) localVideo.muted = true;
      }
    });
    
    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
